        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .soft-red-degradation {
            background: radial-gradient(circle at top right, rgba(186, 26, 32, 0.08), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(186, 26, 32, 0.05), transparent 40%);
        }
        .clay-shadow {
            box-shadow: 0px 20px 40px rgba(186, 26, 32, 0.12),
                        inset 4px 4px 8px rgba(255, 255, 255, 0.3),
                        inset -4px -4px 8px rgba(186, 26, 32, 0.1);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
        }
        .ghost-border {
            outline: 1.5px solid rgba(143, 111, 110, 0.15);

    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col soft-red-degradation selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Top App Bar (Suppressing Navigation Shell as per Linear Journey Rule) -->
<header class="sticky top-0 z-50 bg-white/60 backdrop-blur-xl flex justify-between items-center w-full px-6 py-4 shadow-sm border-none">
<div class="flex items-center gap-2"><span class="material-symbols-outlined text-primary text-2xl" data-icon="monitor_heart" style="font-variation-settings: 'FILL' 1;">monitor_heart</span>
<h1 class="font-headline font-extrabold text-xl tracking-tighter text-primary">KeepBeat</h1></div>
</header>
<main class="flex-grow flex items-center justify-center px-4 py-12 md:py-24">
<div class="w-full max-w-md space-y-8">
<!-- Branding & Welcome Header -->
<div class="text-center space-y-3">
<div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-primary-container clay-shadow mb-4"><span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="monitor_heart" style="font-variation-settings: 'FILL' 1;">monitor_heart</span></div>
<h2 class="font-headline font-extrabold text-4xl md:text-5xl tracking-tight text-on-surface">Welcome Back</h2>
<p class="font-body text-on-surface-variant text-lg">Your heart's journey continues here.</p>
</div>
<!-- Bento Form Container -->
<div class="glass-card ghost-border rounded-[2rem] p-8 md:p-10 space-y-6 shadow-xl">
<!-- Input Fields Section -->
<form class="space-y-5">
<div class="space-y-2">
<label class="font-label text-sm font-semibold tracking-wide text-on-surface-variant uppercase px-1" for="email">Email Address</label>
<div class="relative">
<input class="w-full h-14 px-6 rounded-2xl bg-surface-container-high border-none focus:ring-2 focus:ring-primary-fixed text-on-surface placeholder:text-outline/50 font-medium transition-all" id="email" placeholder="heart@keepbeat.com" type="email"/>
</div>
</div>
<div class="space-y-2 text-right">
<div class="flex justify-between items-center px-1">
<label class="font-label text-sm font-semibold tracking-wide text-on-surface-variant uppercase" for="password">Password</label>
<a class="font-label text-xs font-bold text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full h-14 px-6 rounded-2xl bg-surface-container-high border-none focus:ring-2 focus:ring-primary-fixed text-on-surface placeholder:text-outline/50 font-medium transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full h-14 mt-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold text-lg rounded-2xl clay-shadow hover:scale-[0.98] active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-px flex-grow bg-outline-variant/30"></div>
<span class="font-label text-xs font-bold text-outline uppercase tracking-tighter">OR CONTINUE WITH</span>
<div class="h-px flex-grow bg-outline-variant/30"></div>
</div>
<!-- Social Login Bento -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 h-14 rounded-2xl bg-white ghost-border hover:bg-surface-container-low transition-colors group">
<img alt="" class="w-6 h-6 grayscale group-hover:grayscale-0 transition-all" data-alt="minimalist 3d-style google logo on white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC0U9OUbUg2DOkDK1ByGrOb1NoTM3IVrEXv-Ll3OqzoopK0SPBBWSVUZsea30pXiWn3Xp-GTSbrAxk-S3KGY83j8VIw6qBKvRjNIPYsrwKamwDZ_gLr9dR36yp3wcnfu8mpXkcOkDuPoMnyGbOUDc-XTB2hkUFjYY4W7rKnD1jEputVl0mkc1XJ5tVsADJiPR1fgwXHqAUe-vKpmDAJ1Z5h3o36miU-fRCsaPCyCo26ssQ1Soia7-7fW0kwuandlpyFSFJWmAfwJ6s"/>
<span class="font-body font-semibold text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-3 h-14 rounded-2xl bg-white ghost-border hover:bg-surface-container-low transition-colors group">
<span class="material-symbols-outlined text-2xl text-on-surface" data-icon="apple" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="font-body font-semibold text-on-surface">Apple</span>
</button>
</div>
</div>
<!-- Bottom Navigation Link -->
<div class="text-center pb-8">
<p class="font-body text-on-surface-variant">
                    New to KeepBeat? 
                    <a class="font-bold text-primary hover:underline underline-offset-4 decoration-primary/30 ml-1" href="#">Create an account</a>
</p>
</div>
</div>
</main>
<!-- Contextual Health Insight (Micro-Bento) -->
<footer class="max-w-md mx-auto w-full px-4 pb-12">
<div class="bg-tertiary-fixed/30 backdrop-blur-md rounded-2xl p-4 flex items-start gap-4 ghost-border">
<div class="bg-tertiary-container rounded-xl p-2">
<span class="material-symbols-outlined text-on-tertiary-container text-xl" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<div>
<h4 class="font-label text-xs font-bold text-on-tertiary-fixed uppercase tracking-wider">AI Security Tip</h4>
<p class="font-body text-xs text-on-tertiary-fixed-variant leading-relaxed">KeepBeat uses biometric-grade encryption to protect your vital statistics. Always use a unique password.</p>
</div>
</div>
</footer>
